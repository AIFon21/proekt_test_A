<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экономная аптека — присоединяйтесь к команде</title>
  <style>
    :root {
      --orange: rgb(255, 130, 0);
      --orange-soft: rgb(249, 157, 42);
      --mint: rgb(210, 235, 226);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, var(--mint) 0%, #fff 35%, var(--orange-soft) 100%);
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      box-shadow:
        0 4px 24px rgba(255, 130, 0, 0.15),
        0 0 0 1px rgba(249, 157, 42, 0.2);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-soft) 100%);
      color: #fff;
      padding: 32px 28px;
      text-align: center;
    }

    .card-header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.45;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
    }

    .card-body {
      padding: 28px;
      background: linear-gradient(180deg, var(--mint) 0%, rgba(210, 235, 226, 0.35) 100%);
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #2d3d38;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(255, 130, 0, 0.25);
      border-radius: 12px;
      font-size: 1rem;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 130, 0, 0.2);
    }

    input::placeholder {
      color: #94a89f;
    }

    .field {
      margin-bottom: 20px;
    }

    .field:last-of-type {
      margin-bottom: 24px;
    }

    .hint {
      font-size: 0.75rem;
      color: #5c6f68;
      margin-top: 6px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-soft) 100%);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255, 130, 0, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(255, 130, 0, 0.45);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    .success {
      display: none;
      text-align: center;
      padding: 20px;
      background: var(--mint);
      border-radius: 12px;
      color: #1e3d32;
      font-weight: 600;
      margin-top: 8px;
    }

    .success.visible {
      display: block;
    }

    .form-error {
      display: none;
      text-align: center;
      padding: 14px;
      background: #ffe8e0;
      border-radius: 12px;
      color: #8b2e12;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .form-error.visible {
      display: block;
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Добро пожаловать в команду<br>Экономной аптеки</h1>
    </div>
    <div class="card-body">
      <form id="lead-form" action="https://formsubmit.co/yavorskaya-ms@gran-k.ru" method="POST" novalidate>
        <input type="hidden" name="_subject" value="Заявка с лендинга Экономная аптека">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" id="form-next" value="">
        <div class="field">
          <label for="name">Имя</label>
          <input type="text" id="name" name="name" required autocomplete="name" placeholder="Введите ваше имя">
        </div>
        <div class="field">
          <label for="phone">Мобильный номер</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            autocomplete="tel"
            inputmode="tel"
            placeholder="+79167708766"
            pattern="\+7[0-9]{10}"
            title="Формат: +7 и 10 цифр, например +79167708766"
          >
          <p class="hint">Формат: +7 и 10 цифр (пример: +79167708766)</p>
        </div>
        <div class="field">
          <label for="telegram">Ник в Telegram</label>
          <input type="text" id="telegram" name="telegram" required autocomplete="username" placeholder="@username или username">
        </div>
        <button type="submit">Отправить заявку</button>
        <p class="success" id="success-msg" role="status">Спасибо! Мы свяжемся с вами.</p>
      </form>
    </div>
  </div>
  <script>
    (function () {
      var form = document.getElementById("lead-form");
      var phone = document.getElementById("phone");
      var success = document.getElementById("success-msg");
      var nextInput = document.getElementById("form-next");
      var submitBtn = form.querySelector('button[type="submit"]');

      if (new URLSearchParams(window.location.search).get("thanks") === "1") {
        success.classList.add("visible");
        window.history.replaceState({}, "", window.location.pathname);
      }

      phone.addEventListener("blur", function () {
        var v = phone.value.trim().replace(/\s/g, "");
        if (v && !v.startsWith("+")) {
          if (v.startsWith("8") && v.length === 11) {
            phone.value = "+7" + v.slice(1);
          } else if (v.startsWith("7") && v.length === 11) {
            phone.value = "+" + v;
          }
        }
      });

      form.addEventListener("submit", function (e) {
        var tel = phone.value.trim().replace(/\s/g, "");
        if (!/^\+7\d{10}$/.test(tel)) {
          e.preventDefault();
          phone.setCustomValidity("Укажите номер в формате +79167708766");
          phone.reportValidity();
          return;
        }
        phone.setCustomValidity("");
        var url = window.location.href.split("#")[0];
        var sep = url.indexOf("?") >= 0 ? "&" : "?";
        nextInput.value = url + sep + "thanks=1";
        submitBtn.disabled = true;
      });
    })();
  </script>
</body>
</html>
