<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экономная аптека — присоединяйтесь к команде</title>
  <style>
    :root {
      --orange: rgb(255, 130, 0);
      --orange-soft: rgb(249, 157, 42);
      --mint: rgb(210, 235, 226);
    }

    * {
      box-sizing: border-box;
    }

    @keyframes bg-drift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes float-orb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(12px, -18px) scale(1.03); }
      66% { transform: translate(-10px, 10px) scale(0.98); }
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes header-gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes title-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes field-in {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pulse-soft {
      0%, 100% { box-shadow: 0 4px 14px rgba(255, 130, 0, 0.4); }
      50% { box-shadow: 0 6px 22px rgba(255, 130, 0, 0.55); }
    }

    @keyframes cross-fade {
      0%, 100% { opacity: 0.35; transform: rotate(0deg); }
      50% { opacity: 0.55; transform: rotate(90deg); }
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--mint) 0%, #fff 40%, var(--orange-soft) 100%);
      background-size: 200% 200%;
      animation: bg-drift 18s ease-in-out infinite;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(48px);
      opacity: 0.45;
      animation: float-orb 14s ease-in-out infinite;
    }

    body::before {
      width: min(320px, 55vw);
      height: min(320px, 55vw);
      background: rgba(255, 130, 0, 0.35);
      top: -8%;
      right: -5%;
    }

    body::after {
      width: min(280px, 50vw);
      height: min(280px, 50vw);
      background: rgba(210, 235, 226, 0.9);
      bottom: -10%;
      left: -8%;
      animation-delay: -7s;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      box-shadow:
        0 4px 24px rgba(255, 130, 0, 0.15),
        0 0 0 1px rgba(249, 157, 42, 0.2);
      overflow: hidden;
      animation: card-in 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .card-header {
      position: relative;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-soft) 50%, rgb(255, 150, 40) 100%);
      background-size: 200% 200%;
      animation: header-gradient 10s ease infinite;
      color: #fff;
      padding: 32px 28px;
      text-align: center;
    }

    .card-header::after {
      content: "+";
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 2rem;
      font-weight: 300;
      line-height: 1;
      opacity: 0.4;
      animation: cross-fade 12s ease-in-out infinite;
    }

    .card-header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.45;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
      animation: title-in 0.65s ease 0.15s backwards;
    }

    .card-body {
      padding: 28px;
      background: linear-gradient(180deg, var(--mint) 0%, rgba(210, 235, 226, 0.35) 100%);
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #2d3d38;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(255, 130, 0, 0.25);
      border-radius: 12px;
      font-size: 1rem;
      background: #fff;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 130, 0, 0.2);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: #94a89f;
    }

    .field {
      margin-bottom: 20px;
      animation: field-in 0.55s ease backwards;
    }

    .field:nth-of-type(1) { animation-delay: 0.35s; }
    .field:nth-of-type(2) { animation-delay: 0.48s; }
    .field:nth-of-type(3) { animation-delay: 0.61s; }

    .field:last-of-type {
      margin-bottom: 24px;
    }

    .hint {
      font-size: 0.75rem;
      color: #5c6f68;
      margin-top: 6px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-soft) 100%);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255, 130, 0, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: field-in 0.55s ease 0.72s backwards, pulse-soft 3.5s ease-in-out 1.2s infinite;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 22px rgba(255, 130, 0, 0.5);
      animation: none;
    }

    button[type="submit"]:active {
      transform: translateY(0) scale(0.99);
    }

    .success {
      display: none;
      text-align: center;
      padding: 20px;
      background: var(--mint);
      border-radius: 12px;
      color: #1e3d32;
      font-weight: 600;
      margin-top: 8px;
    }

    .success.visible {
      display: block;
    }

    .form-error {
      display: none;
      text-align: center;
      padding: 14px;
      background: #ffe8e0;
      border-radius: 12px;
      color: #8b2e12;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .form-error.visible {
      display: block;
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
      animation: none;
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      body::before,
      body::after,
      .card,
      .card-header,
      .card-header::after,
      .card-header h1,
      .field,
      button[type="submit"] {
        animation: none !important;
      }

      body {
        background-size: 100% 100%;
      }

      .card {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Добро пожаловать в команду<br>Экономной аптеки</h1>
    </div>
    <div class="card-body">
      <form id="lead-form" action="https://formsubmit.co/yavorskaya-ms@gran-k.ru" method="POST" novalidate>
        <input type="hidden" name="_subject" value="Заявка с лендинга Экономная аптека">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" id="form-next" value="">
        <div class="field">
          <label for="name">Имя</label>
          <input type="text" id="name" name="name" required autocomplete="name" placeholder="Введите ваше имя">
        </div>
        <div class="field">
          <label for="phone">Мобильный номер</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            autocomplete="tel"
            inputmode="tel"
            placeholder="+79167708766"
            pattern="\+7[0-9]{10}"
            title="Формат: +7 и 10 цифр, например +79167708766"
          >
          <p class="hint">Формат: +7 и 10 цифр (пример: +79167708766)</p>
        </div>
        <div class="field">
          <label for="telegram">Ник в Telegram</label>
          <input type="text" id="telegram" name="telegram" required autocomplete="username" placeholder="@username или username">
        </div>
        <button type="submit">Отправить заявку</button>
        <p class="success" id="success-msg" role="status">Спасибо! Мы свяжемся с вами.</p>
      </form>
    </div>
  </div>
  <script>
    (function () {
      var form = document.getElementById("lead-form");
      var phone = document.getElementById("phone");
      var success = document.getElementById("success-msg");
      var nextInput = document.getElementById("form-next");
      var submitBtn = form.querySelector('button[type="submit"]');

      if (new URLSearchParams(window.location.search).get("thanks") === "1") {
        success.classList.add("visible");
        window.history.replaceState({}, "", window.location.pathname);
      }

      phone.addEventListener("blur", function () {
        var v = phone.value.trim().replace(/\s/g, "");
        if (v && !v.startsWith("+")) {
          if (v.startsWith("8") && v.length === 11) {
            phone.value = "+7" + v.slice(1);
          } else if (v.startsWith("7") && v.length === 11) {
            phone.value = "+" + v;
          }
        }
      });

      form.addEventListener("submit", function (e) {
        var tel = phone.value.trim().replace(/\s/g, "");
        if (!/^\+7\d{10}$/.test(tel)) {
          e.preventDefault();
          phone.setCustomValidity("Укажите номер в формате +79167708766");
          phone.reportValidity();
          return;
        }
        phone.setCustomValidity("");
        var url = window.location.href.split("#")[0];
        var sep = url.indexOf("?") >= 0 ? "&" : "?";
        nextInput.value = url + sep + "thanks=1";
        submitBtn.disabled = true;
      });
    })();
  </script>
</body>
</html>
